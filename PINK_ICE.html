<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Shape Collector</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/23.1.2/tween.umd.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Lilita+One&display=swap');
        
        * { 
            box-sizing: border-box; 
            margin: 0;
            padding: 0;
        }
        
        html, body {
            height: 100%;
        }
        
        body {
            background-color: #1a1a2e;
            color: #fff;
            font-family: 'Nunito', sans-serif;
            overflow: hidden;
            touch-action: none;
            min-height: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }

        .hidden { display: none !important; }

        .fun-bg {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #1a1a2e 100%);
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
        }
        .fun-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 80%, rgba(255, 107, 107, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(78, 205, 196, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 40%, rgba(199, 128, 255, 0.1) 0%, transparent 40%);
        }

        .game-wrapper {
            width: 100%;
            max-width: var(--game-width, 420px);
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .game-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            border-radius: clamp(12px, 3vmin, 20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Header */
        .header {
            padding: clamp(10px, 3vmin, 16px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .score-label {
            font-size: clamp(9px, 2vmin, 11px);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #67e8f9;
            font-weight: 700;
            opacity: 0.8;
        }

        .score-value {
            font-family: 'Lilita One', cursive;
            font-size: clamp(1.25rem, 5vmin, 1.875rem);
            background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .best-score {
            font-size: clamp(10px, 2vmin, 12px);
            color: rgba(255,255,255,0.5);
        }
        .best-score span {
            color: #fde047;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: clamp(6px, 2vmin, 12px);
        }

        .toggle-btn {
            padding: clamp(4px, 1.5vmin, 8px);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            background: transparent;
            cursor: pointer;
            font-size: clamp(16px, 4vmin, 20px);
            transition: all 0.2s;
            width: clamp(32px, 8vmin, 40px);
            height: clamp(32px, 8vmin, 40px);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toggle-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .toggle-btn.active {
            border-color: rgba(78, 205, 196, 0.6);
            background: rgba(78, 205, 196, 0.15);
        }

        .energy-container {
            width: clamp(80px, 20vmin, 112px);
        }

        .energy-label {
            font-size: clamp(9px, 2vmin, 11px);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #f9a8d4;
            font-weight: 700;
            margin-bottom: 4px;
            opacity: 0.8;
        }

        .energy-bar-outer {
            height: clamp(14px, 3.5vmin, 20px);
            background: rgba(0,0,0,0.3);
            border-radius: 9999px;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
            padding: 2px;
        }

        .energy-bar-fill {
            height: 100%;
            border-radius: 9999px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
            transition: width 0.3s ease-out;
        }

        .energy-value {
            font-size: clamp(10px, 2vmin, 12px);
            font-weight: 700;
            margin-top: 4px;
            color: rgba(255,255,255,0.7);
        }

        /* Announcements */
        .announcement-layer {
            height: clamp(20px, 5vmin, 28px);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            margin: clamp(4px, 1vmin, 8px) 0;
        }

        .announcement-text {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards,
                       fadeOut 0.4s ease 2.2s forwards;
            white-space: nowrap;
            font-weight: 700;
            font-size: clamp(11px, 2.5vmin, 13px);
            color: #67e8f9;
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }

        /* Game Container */
        .game-container {
            position: relative;
            padding: clamp(4px, 1vmin, 8px);
            transition: all 0.5s;
        }

        #gameCanvas {
            width: 100%;
            height: auto;
            cursor: pointer;
            border-radius: clamp(8px, 2vmin, 12px);
            display: block;
        }

        /* Overlays */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(20px);
            border-radius: clamp(8px, 2vmin, 12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: clamp(12px, 3vmin, 20px);
            overflow-y: auto;
        }

        .overlay-title {
            font-family: 'Lilita One', cursive;
            font-size: clamp(1.25rem, 5vmin, 1.875rem);
            color: #67e8f9;
            text-shadow: 0 4px 0 rgba(0,0,0,0.3), 0 0 20px rgba(78, 205, 196, 0.5);
            margin-bottom: 4px;
        }

        .high-score-alert {
            color: #fde047;
            font-weight: 700;
            font-size: clamp(11px, 2.5vmin, 14px);
            margin-bottom: 8px;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .final-score-section {
            margin-bottom: clamp(8px, 2vmin, 12px);
        }

        .final-score-label {
            color: rgba(255,255,255,0.5);
            font-size: clamp(9px, 2vmin, 11px);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .final-score-value {
            font-family: 'Lilita One', cursive;
            font-size: clamp(1.5rem, 6vmin, 2.25rem);
            background: linear-gradient(135deg, #ffeaa7, #fdcb6e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(12px, 4vmin, 20px);
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: clamp(8px, 2vmin, 12px) clamp(16px, 4vmin, 24px);
            margin-bottom: clamp(10px, 3vmin, 16px);
        }
        .stats-bar.compact {
            padding: clamp(6px, 1.5vmin, 8px) clamp(12px, 3vmin, 20px);
            margin-bottom: clamp(8px, 2vmin, 12px);
        }
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-value {
            font-family: 'Lilita One', cursive;
            font-size: clamp(1.1rem, 4vmin, 1.5rem);
            color: #4ecdc4;
        }
        .stats-bar.compact .stat-value {
            font-size: clamp(1rem, 3vmin, 1.25rem);
        }
        .stat-label {
            font-size: clamp(8px, 2vmin, 10px);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: rgba(255,255,255,0.5);
            font-weight: 700;
        }
        .stat-divider {
            width: 1px;
            height: clamp(20px, 5vmin, 30px);
            background: rgba(255,255,255,0.15);
        }

        /* Tabs */
        .tab-container {
            display: flex;
            gap: clamp(4px, 1.5vmin, 8px);
            margin-bottom: clamp(8px, 2vmin, 12px);
        }

        .tab-btn {
            padding: clamp(6px, 1.5vmin, 8px) clamp(10px, 3vmin, 16px);
            border-radius: 12px;
            font-size: clamp(10px, 2.5vmin, 12px);
            font-weight: 700;
            transition: all 0.2s;
            border: 2px solid transparent;
            background: rgba(255,255,255,0.05);
            color: #fff;
            cursor: pointer;
        }
        .tab-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .tab-btn.active {
            background: rgba(78, 205, 196, 0.25);
            color: #4ecdc4;
            border-color: rgba(78, 205, 196, 0.5);
        }

        /* Debrief Content */
        .debrief-content {
            min-height: 200px;
            max-height: calc(100% - 200px);
            width: 100%;
            overflow-y: auto;
        }

        .shape-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            max-height: 100%;
            overflow-y: auto;
            padding: 8px;
        }

        .shape-grid::-webkit-scrollbar { width: 6px; }
        .shape-grid::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 3px; }
        .shape-grid::-webkit-scrollbar-thumb { background: rgba(78, 205, 196, 0.4); border-radius: 3px; }

        .shape-card {
            background: rgba(255,255,255,0.08);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: clamp(8px, 2vmin, 12px);
            padding: clamp(6px, 2vmin, 10px);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 0.2s;
            position: relative;
        }
        .shape-card:hover {
            background: rgba(255,255,255,0.12);
            transform: translateY(-2px);
        }
        .shape-card.new-discovery {
            border-color: rgba(78, 205, 196, 0.6);
            box-shadow: 0 0 15px rgba(78, 205, 196, 0.3);
        }
        .shape-card.new-discovery::before {
            content: '✨ NEW';
            position: absolute;
            top: -8px;
            right: -4px;
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            color: white;
            font-size: clamp(7px, 1.5vmin, 8px);
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 6px;
        }

        .color-pips {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: clamp(4px, 1.5vmin, 8px);
            gap: 2px;
        }

        .color-pip {
            width: clamp(4px, 1.5vmin, 6px);
            height: clamp(4px, 1.5vmin, 6px);
            border-radius: 50%;
            box-shadow: 0 0 6px currentColor;
        }

        .shape-count {
            font-size: clamp(8px, 2vmin, 10px);
            margin-top: 4px;
            color: rgba(255,255,255,0.5);
            font-weight: 700;
        }

        .empty-state {
            color: rgba(255,255,255,0.4);
            font-style: italic;
            padding: clamp(20px, 6vmin, 40px) clamp(12px, 4vmin, 20px);
            grid-column: span 3;
            text-align: center;
            font-size: clamp(12px, 3vmin, 14px);
        }

        /* Histogram */
        .histogram {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: clamp(8px, 3vmin, 16px);
            height: clamp(100px, 25vmin, 144px);
            width: 100%;
            padding: 0 clamp(12px, 4vmin, 24px);
        }

        .histogram-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            height: 100%;
            justify-content: flex-end;
        }

        .histogram-value {
            font-size: clamp(11px, 2.5vmin, 14px);
            font-weight: 700;
            color: rgba(255,255,255,0.7);
            margin-bottom: clamp(4px, 1.5vmin, 8px);
        }

        .histogram-bar {
            width: 100%;
            border-radius: 6px 6px 0 0;
            transition: height 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Play Button */
        .play-btn {
            background: linear-gradient(135deg, #4ecdc4, #44a08d);
            font-family: 'Lilita One', cursive;
            font-size: clamp(13px, 3vmin, 16px);
            letter-spacing: 1px;
            border: none;
            box-shadow: 0 4px 0 #2d7a74, 0 6px 20px rgba(78, 205, 196, 0.4);
            transition: all 0.15s;
            color: #fff;
            padding: clamp(10px, 2.5vmin, 12px) clamp(24px, 6vmin, 32px);
            border-radius: 9999px;
            cursor: pointer;
            margin-top: clamp(10px, 3vmin, 16px);
        }
        .play-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 #2d7a74, 0 8px 25px rgba(78, 205, 196, 0.5);
        }
        .play-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #2d7a74, 0 4px 15px rgba(78, 205, 196, 0.3);
        }

        /* Power-ups */
        .power-ups {
            margin-top: clamp(8px, 2vmin, 16px);
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: clamp(4px, 1.5vmin, 8px);
            transition: all 0.4s ease;
        }

        .overlay-active .power-ups {
            opacity: 0;
            pointer-events: none;
            transform: translateY(20px);
        }

        .power-btn {
            padding: clamp(8px, 2vmin, 12px);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid rgba(255,255,255,0.15);
        }
        .power-btn:hover {
            transform: translateY(-2px);
        }
        .power-btn:active {
            transform: scale(0.95);
        }
        .power-btn.active {
            background: rgba(78, 205, 196, 0.3);
            border-color: rgba(78, 205, 196, 0.9);
            box-shadow: 0 0 20px rgba(78, 205, 196, 0.5);
        }

        .power-btn .icon {
            font-size: clamp(18px, 4vmin, 24px);
        }

        .power-btn .label {
            font-size: clamp(8px, 2vmin, 10px);
            color: rgba(255,255,255,0.6);
            font-weight: 700;
            margin-top: 4px;
        }

        .badge {
            position: absolute;
            top: -6px;
            right: -6px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
            font-size: clamp(9px, 2vmin, 11px);
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: 900;
            box-shadow: 0 2px 8px rgba(255, 107, 107, 0.5);
        }

        .collection-btn {
            background: rgba(88, 28, 135, 0.3);
            border-color: rgba(167, 139, 250, 0.3);
        }
        .collection-btn .label {
            color: #c4b5fd;
        }
    </style>
</head>
<body id="main-body">
    <div class="fun-bg"></div>

    <div class="game-wrapper">
        <!-- Header -->
        <div class="game-panel header">
            <div>
                <p class="score-label">Score</p>
                <h1 id="score-display" class="score-value">0</h1>
                <p class="best-score">Best: <span id="best-score-display">0</span></p>
            </div>
            <div class="header-right">
                <button id="flair-toggle" class="toggle-btn active" onclick="toggleFlair()" title="Toggle visual effects">
                    <span id="flair-icon">✨</span>
                </button>
                <button id="mute-toggle" class="toggle-btn" onclick="toggleMute()" title="Toggle sound">
                    <span id="mute-icon">🔊</span>
                </button>
                <div class="energy-container">
                    <p class="energy-label">Energy</p>
                    <div class="energy-bar-outer">
                        <div id="energy-bar-fill" class="energy-bar-fill" style="width: 100%"></div>
                    </div>
                    <p id="energy-pct-display" class="energy-value">30</p>
                </div>
            </div>
        </div>

        <!-- Announcement Area -->
        <div id="announcement-layer" class="announcement-layer"></div>

        <!-- Game Canvas Container -->
        <div id="container" class="game-panel game-container">
            <canvas id="gameCanvas"></canvas>
            
            <!-- Mid-Game Collection Viewer -->
            <div id="collection-viewer" class="overlay hidden" style="z-index: 50;">
                <h2 class="overlay-title">My Collection</h2>
                
                <div class="stats-bar">
                    <div class="stat-item">
                        <span class="stat-value" id="stat-total-shapes">0</span>
                        <span class="stat-label">Shapes Found</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-complete-sets">0</span>
                        <span class="stat-label">Complete Sets</span>
                    </div>
                </div>
                
                <div class="tab-container">
                    <button id="tab-coll-this" onclick="showCollectionTab('this')" class="tab-btn active">This Game</button>
                    <button id="tab-coll-all" onclick="showCollectionTab('all')" class="tab-btn">All Time</button>
                </div>

                <div class="debrief-content">
                    <div id="view-coll-this">
                        <div id="coll-this-gallery" class="shape-grid"></div>
                    </div>
                    <div id="view-coll-all" class="hidden">
                        <div id="coll-all-gallery" class="shape-grid"></div>
                    </div>
                </div>

                <button onclick="closeCollection()" class="play-btn">Back to Game</button>
            </div>

            <!-- Game Over Overlay -->
            <div id="game-over" class="overlay hidden" style="z-index: 40;">
                <h2 id="game-over-title" class="overlay-title">Nice Run!</h2>
                <div id="high-score-alert" class="high-score-alert hidden">🎉 New High Score!</div>
                
                <div class="final-score-section">
                    <p class="final-score-label">Score</p>
                    <p class="final-score-value"><span id="final-score">0</span></p>
                </div>

                <div class="stats-bar compact">
                    <div class="stat-item">
                        <span class="stat-value" id="stat-session-new">0</span>
                        <span class="stat-label">New Shapes</span>
                    </div>
                    <div class="stat-divider"></div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-session-complete">0</span>
                        <span class="stat-label">Sets Completed</span>
                    </div>
                </div>

                <div class="tab-container">
                    <button id="tab-shapes" onclick="showDebriefTab('shapes')" class="tab-btn active">New Shapes</button>
                    <button id="tab-colors" onclick="showDebriefTab('colors')" class="tab-btn">Colors</button>
                </div>

                <div class="debrief-content">
                    <div id="view-shapes">
                        <div id="shape-gallery" class="shape-grid"></div>
                    </div>
                    <div id="view-colors" class="hidden">
                        <div id="histogram" class="histogram"></div>
                    </div>
                </div>

                <button onclick="resetGame()" class="play-btn">Play Again</button>
            </div>
        </div>

        <!-- Power-ups -->
        <div id="power-ups-container" class="power-ups">
            <button onclick="activatePower('bomb')" id="btn-bomb" class="game-panel power-btn">
                <span id="count-bomb" class="badge">2</span>
                <span class="icon">💣</span>
                <span class="label">Bomb</span>
            </button>
            <button onclick="activatePower('shuffle')" id="btn-shuffle" class="game-panel power-btn">
                <span id="count-shuffle" class="badge">2</span>
                <span class="icon">🔀</span>
                <span class="label">Shuffle</span>
            </button>
            <button onclick="activatePower('beam')" id="btn-beam" class="game-panel power-btn">
                <span id="count-beam" class="badge">2</span>
                <span class="icon">⚡</span>
                <span class="label">Zap</span>
            </button>
            <button onclick="openCollection()" class="game-panel power-btn collection-btn">
                <span class="icon">📚</span>
                <span class="label">Collection</span>
            </button>
        </div>
    </div>

    <script>
        // ==================== SOUND MANAGER ====================
        class RetroSoundManager {
            constructor() {
                this.audioContext = null;
                this.masterGain = null;
                this.enabled = localStorage.getItem('starblast_mute') !== 'true';
                this.initAudio();
            }
            initAudio() {
                try {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                    this.masterGain = this.audioContext.createGain();
                    this.masterGain.gain.value = 0.3;
                    this.masterGain.connect(this.audioContext.destination);
                } catch (e) { this.enabled = false; }
            }
            resume() { if (this.audioContext && this.audioContext.state === 'suspended') this.audioContext.resume(); }
            canPlay() { return this.enabled && this.audioContext && this.audioContext.state === 'running'; }
            playBloop(frequency, duration, waveType = 'sine', volume = 0.1) {
                if (!this.canPlay()) return;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                osc.type = waveType;
                osc.frequency.setValueAtTime(frequency, this.audioContext.currentTime);
                gain.gain.setValueAtTime(0, this.audioContext.currentTime);
                gain.gain.linearRampToValueAtTime(volume, this.audioContext.currentTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + duration);
                osc.connect(gain); gain.connect(this.masterGain);
                osc.start(); osc.stop(this.audioContext.currentTime + duration);
            }
            playSweep(startFreq, endFreq, duration, waveType = 'sine', volume = 0.1) {
                if (!this.canPlay()) return;
                const osc = this.audioContext.createOscillator();
                const gain = this.audioContext.createGain();
                osc.type = waveType;
                osc.frequency.setValueAtTime(startFreq, this.audioContext.currentTime);
                osc.frequency.exponentialRampToValueAtTime(endFreq, this.audioContext.currentTime + duration);
                gain.gain.setValueAtTime(volume, this.audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + duration);
                osc.connect(gain); gain.connect(this.masterGain);
                osc.start(); osc.stop(this.audioContext.currentTime + duration);
            }
            sfxPop(count) {
                const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25];
                this.playBloop(scale[count % scale.length], 0.25, 'sine', 0.12);

            sfxBonus() { [392, 523, 659, 783].forEach((f, i) => setTimeout(() => this.playBloop(f, 0.4, 'sine', 0.08), i * 60)); }
            sfxBomb() { this.playSweep(150, 40, 0.6, 'triangle', 0.2); }

            sfxShuffle() { [220, 246].forEach((f, i) => setTimeout(() => this.playBloop(f, 0.2, 'sine', 0.05), i * 100)); }
            sfxUI() { this.playBloop(330, 0.1, 'sine', 0.05); }

        // ==================== PARTICLE SYSTEM ====================
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                
                // Random velocity - burst outward
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed - 2; // Slight upward bias
                
                // Size and life
                this.size = 4 + Math.random() * 6;
                this.life = 1.0;
                this.decay = 0.02 + Math.random() * 0.02;
                
                // Gravity
                this.gravity = 0.15;
                
                // Rotation
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.3;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                this.vx *= 0.98; // Air resistance
                this.life -= this.decay;
                this.rotation += this.rotationSpeed;
                return this.life > 0;
            }
            
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                // Draw a small rounded square
                const size = this.size * this.life;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 8;
                ctx.shadowColor = this.color;
                roundRect(ctx, -size/2, -size/2, size, size, 2);
                ctx.fill();
                
                ctx.restore();
            }
        }

        // Particle manager
        const particles = [];

        function spawnParticles(x, y, color, count = 8) {
            if (!flairEnabled) return;

                particles.push(new Particle(x, y, color));
            }
        }

        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].update()) {
                    particles.splice(i, 1);
                }
            }
        }

        function drawParticles(ctx) {
            particles.forEach(p => p.draw(ctx));
        }

        // Dynamic sizing
        const MIN_CELL_SIZE = 40;

        function calculateOptimalSize() {
            const wrapper = document.querySelector('.game-wrapper');
            const header = document.querySelector('.header');
            const announcements = document.getElementById('announcement-layer');
            const powerUps = document.getElementById('power-ups-container');
            
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            const padding = 24;
            
            const headerHeight = header ? header.offsetHeight : 80;
            const announcementHeight = announcements ? announcements.offsetHeight : 28;
            const powerUpsHeight = powerUps ? powerUps.offsetHeight : 70;
            const panelPadding = 16;
            const gaps = 24;
            
            const reservedHeight = headerHeight + announcementHeight + powerUpsHeight + panelPadding + gaps + padding;
            const availableHeight = viewportHeight - reservedHeight;
            const availableWidth = Math.min(viewportWidth - padding, 600);
            
            const cellFromHeight = Math.floor((availableHeight - GRID_PADDING * 2) / ROWS);
            const cellFromWidth = Math.floor((availableWidth - GRID_PADDING * 2) / COLS);
            
            CELL_SIZE = Math.max(MIN_CELL_SIZE, Math.min(MAX_CELL_SIZE, Math.min(cellFromHeight, cellFromWidth)));
            
            canvas.width = (COLS * CELL_SIZE) + (GRID_PADDING * 2);
            canvas.height = (ROWS * CELL_SIZE) + (GRID_PADDING * 2);
            
            const gameWidth = canvas.width + 20;
            document.documentElement.style.setProperty('--game-width', gameWidth + 'px');
            
            return CELL_SIZE;
        }

        // ==================== BLOCK CLASS ====================
        class Block {
            constructor(row, col, colorIndex) {
                this.row = row; 
                this.col = col; 
                this.colorIndex = colorIndex;
                this.pos = { x: col * CELL_SIZE, y: -500 };
                this.scale = 1; 
                this.alpha = 1;
            }
            
            tweenTo(r, c, delay = 0) {
                return new TWEEN.Tween(this.pos)
                    .to({ x: c * CELL_SIZE, y: r * CELL_SIZE }, 350)
                    .easing(TWEEN.Easing.Bounce.Out).delay(delay).start();
            }
            
            // Pop animation with particles
            pop(delay = 0) {
                return new Promise(resolve => {
                    setTimeout(() => {
                        // Spawn particles at block center
                        const centerX = GRID_PADDING + this.pos.x + CELL_SIZE / 2;
                        const centerY = GRID_PADDING + this.pos.y + CELL_SIZE / 2;
                        spawnParticles(centerX, centerY, COLORS[this.colorIndex], 6);
                        
                        // Animate pop
                        new TWEEN.Tween(this)
                            .to({ scale: flairEnabled ? 1.3 : 0, alpha: 0 }, flairEnabled ? 150 : 100)
                            .easing(TWEEN.Easing.Back.In)
                            .onComplete(() => {
                                if (flairEnabled) {
                                    new TWEEN.Tween(this)
                                        .to({ scale: 0 }, 50)
                                        .start();
                                }
                                resolve();
                            })
                            .start();
                    }, delay);
                });
            }
            
            draw() {
                if (this.alpha <= 0) return;
                
                const x = GRID_PADDING + this.pos.x + MARGIN;
                const y = GRID_PADDING + this.pos.y + MARGIN;
                const size = CELL_SIZE - MARGIN * 2;
                const color = COLORS[this.colorIndex];
                
                ctx.save(); 
                ctx.globalAlpha = this.alpha; 
                ctx.translate(x + size/2, y + size/2); 
                ctx.scale(this.scale, this.scale);
                
                if (activePower && !isProcessing && !isPaused) {
                    ctx.shadowBlur = 20; 
                    ctx.shadowColor = '#fff'; 
                    ctx.lineWidth = 3; 
                    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
                    roundRect(ctx, -size/2 - 2, -size/2 - 2, size + 4, size + 4, 14); 
                    ctx.stroke();
                }
                
                ctx.shadowBlur = 12; 
                ctx.shadowColor = color;
                const grad = ctx.createLinearGradient(-size/2, -size/2, size/2, size/2);
                grad.addColorStop(0, lightenColor(color, 20)); 
                grad.addColorStop(1, color);
                ctx.fillStyle = grad; 
                roundRect(ctx, -size/2, -size/2, size, size, 14); 
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.25)';
                roundRect(ctx, -size/2 + 4, -size/2 + 4, size - 8, size/2 - 4, 10);
                ctx.fill();
                
                ctx.restore();
            }
        }

        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath(); 
            ctx.moveTo(x + r, y); 
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r); 
            ctx.lineTo(x + w, h + y - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); 
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r); 
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y); 
            ctx.closePath();
        }

        function lightenColor(hex, amt) {
            let num = parseInt(hex.slice(1), 16);
            let r = Math.min(255, (num >> 16) + amt);
            let g = Math.min(255, ((num >> 8) & 0x00FF) + amt);
            let b = Math.min(255, (num & 0x0000FF) + amt);
            return "#" + (b | (g << 8) | (r << 16)).toString(16).padStart(6, '0');
        }

        function initGrid() {
            grid = [];
            for (let r = 0; r < ROWS; r++) {
                grid[r] = [];
                for (let c = 0; c < COLS; c++) {
                    const b = new Block(r, c, Math.floor(Math.random() * COLORS.length));
                    b.pos.y = -((ROWS - r) * 120 + Math.random() * 200);
                    b.tweenTo(r, c, (ROWS - r) * 30 + (c * 10)); 
                    grid[r][c] = b;
                }
            }
        }

        function getMatches(r, c, colorIndex, visited = new Set()) {
            const key = `${r},${c}`;
            if (r < 0 || r >= ROWS || c < 0 || c >= COLS || visited.has(key)) return [];
            if (!grid[r][c] || grid[r][c].colorIndex !== colorIndex) return [];
            visited.add(key);
            let matches = [{r, c}];
            matches = matches.concat(
                getMatches(r+1, c, colorIndex, visited), 
                getMatches(r-1, c, colorIndex, visited), 
                getMatches(r, c+1, colorIndex, visited), 
                getMatches(r, c-1, colorIndex, visited)
            );
            return matches;
        }

        function getShapeSignature(matches) {
            if (!matches.length) return "";
            const rows = matches.map(m => m.r);
            const cols = matches.map(m => m.c);
            const minR = Math.min(...rows);
            const minC = Math.min(...cols);
            return matches
                .map(m => `${m.r - minR},${m.c - minC}`)
                .sort()
                .join('|');
        }

        function trackShape(sig, colorIndex) {
            const isFirstEverDiscovery = !collection[sig];
            const isNewThisSession = !sessionShapes[sig];
            
            if (isNewThisSession) {
                sessionShapes[sig] = { count: 0, colors: new Array(COLORS.length).fill(false) };
            }
            sessionShapes[sig].count++;
            sessionShapes[sig].colors[colorIndex] = true;
            
            if (isFirstEverDiscovery) {
                newDiscoveries.push(sig);
                announce("New Shape!", "✨");
                sound.sfxDiscovery();
            }
            
            const wasRainbow = sessionShapes[sig].colors.filter(c => c).length === COLORS.length - 1;
            const isNowRainbow = sessionShapes[sig].colors.every(c => c);
            if (isNowRainbow && wasRainbow) {
                announce("Rainbow Bonus!", "🌈");
                sound.sfxRainbow();
                energy = Math.min(MAX_ENERGY, energy + 5);
                sessionCompletions.push(sig);
                updateUI();
            }
            
            if (!collection[sig]) {
                collection[sig] = { count: 0, colors: new Array(COLORS.length).fill(false) };
            }
            collection[sig].count++;
            collection[sig].colors[colorIndex] = true;
            localStorage.setItem('starblast_collection_v3', JSON.stringify(collection));
        }

        async function handleInteraction(r, c) {
            if (isProcessing || energy <= 0 || isPaused) return;
            sound.resume();
            
            // Store click origin for staggered effects
            const clickOrigin = { r, c };
            
            if (activePower === 'bomb') {
                isProcessing = true; 
                powers.bomb--; 
                activePower = null; 
                sound.sfxBomb();
                const affected = [];
                for(let dr=-1; dr<=1; dr++) {
                    for(let dc=-1; dc<=1; dc++) {
                        if (r+dr >=0 && r+dr < ROWS && c+dc >=0 && c+dc < COLS) {
                            affected.push({r: r+dr, c: c+dc});
                        }
                    }
                }
                await blastMatches(affected, clickOrigin);
            } else if (activePower === 'beam') {
                isProcessing = true; 
                powers.beam--; 
                activePower = null; 
                sound.sfxBeam();
                const affected = [];
                for(let i=0; i<COLS; i++) affected.push({r, c: i});
                for(let i=0; i<ROWS; i++) if (i !== r) affected.push({r: i, c});
                await blastMatches(affected, clickOrigin);
            } else {
                const colorIndex = grid[r][c].colorIndex;
                const matches = getMatches(r, c, colorIndex);
                if (matches.length >= 2) {
                    isProcessing = true; 
                    energy--; 
                    trackShape(getShapeSignature(matches), colorIndex);
                    if (matches.length >= 6) { 
                        energy = Math.min(MAX_ENERGY, energy + 1); 
                        sound.sfxBonus(); 
                    }
                    await blastMatches(matches, clickOrigin);
                } else {
                    sound.sfxUI();
                }
            }
            updatePowerUI(); 
            updateUI();
            if (energy <= 0 && !isProcessing) setTimeout(endGame, 800);
        }

        async function blastMatches(matches, origin) {
            score += matches.length * 100;
            
            // Sort matches by distance from click origin for staggered effect
            const sortedMatches = [...matches].sort((a, b) => {
                const distA = Math.abs(a.r - origin.r) + Math.abs(a.c - origin.c);
                const distB = Math.abs(b.r - origin.r) + Math.abs(b.c - origin.c);
                return distA - distB;
            });
            
            // Calculate delay per block based on flair setting
            const baseDelay = flairEnabled ? 40 : 0;
            const maxDelay = flairEnabled ? sortedMatches.length * baseDelay : 0;
            
            // Start all pop animations with staggered delays
            const popPromises = sortedMatches.map((m, i) => {
                const block = grid[m.r][m.c];
                if (!block) return Promise.resolve();
                
                stats[block.colorIndex]++;
                const delay = i * baseDelay;
                
                // Play sound with stagger
                setTimeout(() => sound.sfxPop(i), delay);
                
                return block.pop(delay);
            });
            
            // Wait for all pops to complete (plus a little buffer)
            await Promise.all(popPromises);
            await new Promise(res => setTimeout(res, flairEnabled ? 100 : 50));
            
            // Clear the grid cells
            matches.forEach(m => { 
                if(grid[m.r]) grid[m.r][m.c] = null; 
            });
            
            refillGrid();
            isProcessing = false;
        }

        function refillGrid() {
            for (let c = 0; c < COLS; c++) {
                let emptySpots = 0;
                for (let r = ROWS - 1; r >= 0; r--) {
                    if (grid[r][c] === null) emptySpots++;
                    else if (emptySpots > 0) {
                        const b = grid[r][c]; 
                        grid[r + emptySpots][c] = b;
                        b.row = r + emptySpots; 
                        b.tweenTo(b.row, c); 
                        grid[r][c] = null;
                    }
                }
                for (let i = 0; i < emptySpots; i++) {
                    const b = new Block(i, c, Math.floor(Math.random() * COLORS.length));
                    b.pos.y = -(i + 2) * CELL_SIZE; 
                    b.tweenTo(i, c, i * 50); 
                    grid[i][c] = b;
                }
            }
        }

        function createShapeCard(sig, data, isNew = false) {
            const coords = sig.split('|').map(s => s.split(',').map(Number));
            const maxR = Math.max(...coords.map(c => c[0])) + 1;
            const maxC = Math.max(...coords.map(c => c[1])) + 1;
            const svgSize = Math.max(32, Math.min(48, CELL_SIZE * 0.6));
            const gridCells = Math.max(maxR, maxC, 3);
            const blockSize = svgSize / gridCells;
            const color = isNew ? '#4ecdc4' : '#c792ea';
            
            let blocksSvg = coords.map(([r,c]) => 
                `<rect x="${c*blockSize}" y="${r*blockSize}" width="${blockSize-2}" height="${blockSize-2}" fill="${color}" rx="3"/>`
            ).join('');
            
            let pipsHtml = data.colors.map((hasColor, i) => 
                hasColor ? `<span class="color-pip" style="color: ${COLORS[i]}; background: ${COLORS[i]}"></span>` : ''
            ).join('');
            
            const newClass = isNew ? 'new-discovery' : '';
            
            return `<div class="shape-card ${newClass}">
                <svg width="${svgSize}" height="${svgSize}" viewBox="0 0 ${svgSize} ${svgSize}">${blocksSvg}</svg>
                <div class="color-pips">${pipsHtml}</div>
                <div class="shape-count">×${data.count}</div>
            </div>`;
        }

        function getCollectionStats() {
            const entries = Object.entries(collection);

        function renderDebrief() {
            document.getElementById('stat-session-new').innerText = newDiscoveries.length;
            document.getElementById('stat-session-complete').innerText = sessionCompletions.length;
            
            histogramContainer.innerHTML = '';
            const maxVal = Math.max(...stats) || 1;
            stats.forEach((count, i) => {
                const h = Math.max(5, (count / maxVal) * 100);
                const barWrapper = document.createElement('div');
                barWrapper.className = 'histogram-item';
                barWrapper.innerHTML = `
                    <div class="histogram-value">${count}</div>
                    <div class="histogram-bar" style="height: ${h}%; background: ${COLORS[i]};"></div>
                `;
                histogramContainer.appendChild(barWrapper);
            });
            
            shapeGalleryContainer.innerHTML = '';
            const sessionEntries = Object.entries(sessionShapes).sort((a, b) => {
                const aNew = newDiscoveries.includes(a[0]) ? 1 : 0;
                const bNew = newDiscoveries.includes(b[0]) ? 1 : 0;
                if (bNew !== aNew) return bNew - aNew;
                return b[1].count - a[1].count;
            });
            
            if (!sessionEntries.length) {
                shapeGalleryContainer.innerHTML = '<p class="empty-state">No shapes collected!</p>';
            } else {
                sessionEntries.forEach(([sig, data]) => {
                    const isNew = newDiscoveries.includes(sig);
                    shapeGalleryContainer.innerHTML += createShapeCard(sig, data, isNew);
                });
            }
        }

        function endGame() {
            finalScoreEl.innerText = score.toLocaleString();
            
            const titleEl = document.getElementById('game-over-title');
            if (score > bestScore) {
                bestScore = score;
                localStorage.setItem('starblast_best', bestScore.toString());
                document.getElementById('high-score-alert').classList.remove('hidden');
                titleEl.innerText = "Amazing!";
            } else if (score > 5000) {
                titleEl.innerText = "Nice Run!";
            } else {
                titleEl.innerText = "Good Try!";
            }
            
            mainBody.classList.add('overlay-active');
            renderDebrief();
            gameOverEl.classList.remove('hidden');
            sound.sfxGameOver();
        }

        function resetGame() {
            score = 0; 
            energy = MAX_ENERGY; 
            stats = [0, 0, 0, 0, 0]; 
            sessionShapes = {};
            newDiscoveries = [];
            sessionCompletions = [];
            powers = { bomb: 2, shuffle: 2, beam: 2 }; 
            isPaused = false;
            particles.length = 0; // Clear any remaining particles
            mainBody.classList.remove('overlay-active');
            document.getElementById('high-score-alert').classList.add('hidden');
            gameOverEl.classList.add('hidden');
            collectionViewerEl.classList.add('hidden');
            showDebriefTab('shapes');
            updateUI(); 
            updatePowerUI(); 
            initGrid();
        }

        canvas.addEventListener('mousedown', (e) => {
            if (isPaused) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            const c = Math.floor((x - GRID_PADDING) / CELL_SIZE);
            const r = Math.floor((y - GRID_PADDING) / CELL_SIZE);
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) handleInteraction(r, c);
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (isPaused) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            const x = (touch.clientX - rect.left) * (canvas.width / rect.width);
            const y = (touch.clientY - rect.top) * (canvas.height / rect.height);
            const c = Math.floor((x - GRID_PADDING) / CELL_SIZE);
            const r = Math.floor((y - GRID_PADDING) / CELL_SIZE);
            if (r >= 0 && r < ROWS && c >= 0 && c < COLS) handleInteraction(r, c);
        }, { passive: false });

        function animate(time) {
            if (!isPaused) {
                TWEEN.update(time);
                updateParticles();
            }
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Draw grid background
            ctx.fillStyle = 'rgba(0,0,0,0.3)'; 
            roundRect(ctx, GRID_PADDING, GRID_PADDING, COLS * CELL_SIZE, ROWS * CELL_SIZE, 16); 
            ctx.fill();
            
            // Draw blocks
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c]) grid[r][c].draw();
                }
            }
            
            // Draw particles on top
            drawParticles(ctx);
            
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            calculateOptimalSize();
            updateMuteUI(); 
            updateFlairUI();
            updateUI(); 
            updatePowerUI(); 
            initGrid(); 
            requestAnimationFrame(animate); 
        };
        
        // Handle window resize
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const oldCellSize = CELL_SIZE;
                calculateOptimalSize();
                
                if (oldCellSize !== CELL_SIZE) {
                    for (let r = 0; r < ROWS; r++) {
                        for (let c = 0; c < COLS; c++) {
                            if (grid[r] && grid[r][c]) {
                                grid[r][c].pos.x = c * CELL_SIZE;
                                grid[r][c].pos.y = r * CELL_SIZE;
                            }
                        }
                    }
                }
            }, 150);
        });
    </script>
</body>
</html>
