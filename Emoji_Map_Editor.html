<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Emoji Map Game</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f5f5;
font-family:sans-serif;
}

.app{
display:flex;
justify-content:center;
align-items:start;
margin-top:20px;
}

.canvas{
box-shadow:0 0 10px;
position:relative;
background-size:cover;
}

.tool{
transition:0.3s;
}

.tool:hover{
transform:scale(1.4);
z-index:2;
}

.structures{
height:600px;
padding:0 1rem;
text-align:center;
overflow-y:auto;
}

.palette{
height:600px;
overflow-y:auto;
}

.structure{
display:block;
cursor:pointer;
font-size:2rem;
width:3rem;
margin:5px auto;
}

.col{
cursor:pointer;
width:4rem;
height:2.4rem;
margin:5px;
}

.toolbar{
display:flex;
width:744px;
margin:20px auto;
}

button{
padding:8px 20px;
color:white;
border:none;
font-size:18px;
background:linear-gradient(to bottom,#2a9cbf,#173faa);
border-radius:5px;
margin-right:10px;
}

button:hover{
background:linear-gradient(to bottom,#499bea,#207ce5);
}

.warn{
filter:hue-rotate(161deg) saturate(134%);
}

</style>
</head>

<body>

<div class="toolbar">
<button class="clear warn">Clear Map</button>
<button class="save">Save Image</button>
</div>

<div class="app">

<div class="structures"></div>

<canvas class="canvas"></canvas>

<div class="palette"></div>

</div>

<script>

const STATE={
mode:"structure",
gridX:0,
gridY:0,
current:"",
structures:"🏠,🏡,🏭,🏢,🏬,🏪,🏣,🏥,🏨,🏰,🏯,🎡,⛲️,🚗,🚙,🚘,🚑,🚧,🚏,⛽️,🚦,🚤,⛵️,🌲,🌳,🌵,🌴,🌼,🗻,⛰️,🌋,🔥,🌊",
colors:["#6B8E23","#9ACD32","#2E8B57","#228B22","#32CD32","#7CFC00","#BDB76B","#F0E68C","#CD853F","#DAA520","#191970","#4169E1","#1E90FF","#B0C4DE","#696969","#A9A9A9","#D3D3D3"]
}

const CANVAS=document.querySelector(".canvas")
const STRUCTURES=document.querySelector(".structures")
const PALETTE=document.querySelector(".palette")
const SAVE_BTN=document.querySelector(".save")
const CLEAR_BTN=document.querySelector(".clear")

const CTX=CANVAS.getContext("2d")

const CWIDTH=600
const CHEIGHT=600
CANVAS.width=CWIDTH
CANVAS.height=CHEIGHT

const GRID_SIZE=40

CTX.font=`${GRID_SIZE-4}px serif`
CTX.textBaseline="top"
CTX.textAlign="center"

const plots=new Map()

class Plot{
constructor(x,y,charX,charY,col,structure){
this.x=x
this.y=y
this.charX=charX
this.charY=charY
this.col=col
this.structure=structure
}
}

for(let x=0;x<CWIDTH;x+=GRID_SIZE){
for(let y=0;y<CHEIGHT;y+=GRID_SIZE){

plots.set(`${x}-${y}`,new Plot(x,y,x+GRID_SIZE/2,y+4,"transparent",""))

}
}

function createUI(){

STATE.structures.split(",").forEach(e=>{
let div=document.createElement("div")
div.className="structure tool"
div.textContent=e
STRUCTURES.appendChild(div)
})

STATE.colors.forEach(e=>{
let div=document.createElement("div")
div.className="col tool"
div.style.backgroundColor=e
div.dataset.hex=e
PALETTE.appendChild(div)
})

}

createUI()

function roundDown(num){
return Math.ceil(num/GRID_SIZE)*GRID_SIZE-GRID_SIZE
}

function redraw(){

CTX.clearRect(0,0,CANVAS.width,CANVAS.height)

plots.forEach(e=>{

CTX.fillStyle=e.col
CTX.fillRect(e.x,e.y,GRID_SIZE,GRID_SIZE)

CTX.fillStyle="black"
CTX.fillText(e.structure,e.charX,e.charY)

})

}

function paint(){

if(!STATE.current)return

let plot=plots.get(`${STATE.gridX}-${STATE.gridY}`)

if(plot){

if(STATE.mode==="structure"){
plot.structure=STATE.current
}

if(STATE.mode==="paint"){
plot.col=STATE.current
}

redraw()

}

}

function erase(){

let plot=plots.get(`${STATE.gridX}-${STATE.gridY}`)
plot.structure=""
redraw()

}

CANVAS.addEventListener("mousemove",e=>{

let cx=e.offsetX
let cy=e.offsetY

STATE.gridX=roundDown(cx)
STATE.gridY=roundDown(cy)

redraw()

CTX.fillStyle="rgba(255,165,0,0.5)"
CTX.fillRect(STATE.gridX,STATE.gridY,GRID_SIZE,GRID_SIZE)

if(e.buttons===1)paint()
if(e.buttons===2)erase()

})

CANVAS.addEventListener("contextmenu",e=>e.preventDefault())

STRUCTURES.addEventListener("click",e=>{
if(e.target.classList.contains("structure")){
STATE.mode="structure"
STATE.current=e.target.textContent
}
})

PALETTE.addEventListener("click",e=>{
if(e.target.classList.contains("col")){
STATE.mode="paint"
STATE.current=e.target.dataset.hex
}
})

CLEAR_BTN.addEventListener("click",()=>{

plots.forEach(p=>{
p.structure=""
p.col="transparent"
})

redraw()

})

SAVE_BTN.addEventListener("click",()=>{

let a=document.createElement("a")
a.download="emoji_map.png"
a.href=CANVAS.toDataURL()
a.click()

})

</script>

</body>
</html>
