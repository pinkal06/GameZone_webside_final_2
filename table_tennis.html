<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Table Tennis Game</title>
  <style>
    body {
  margin: 0;
  padding: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
 background: linear-gradient(to bottom right, #8e44ad, #3498db);
}


.score {
  width: 100%;
  float: left;
  text-align: center;
}
.cover small{
  font-family:calibri;
  color: white;
}

/* Added styles for score animation */
#leftScore, #rightScore {
  display: inline-block;
  font-size: 36px;
  color: #333;
  transition: transform 0.3s ease-in-out;
}

.score-added {
  transform: scale(1.5); /* Scale the score element on animation */
}

.game-area {
  position: relative;
  width: 600px;
  height: 400px;
  border: 2px solid #333;
  margin: auto;
  background:white;
}

.paddle {
  position: absolute;
  width: 10px;
  height: 80px;
  background-color: #333;
}

#leftPaddle {
  left: 10px;
  background-color: green;
}

#rightPaddle {
  right: 10px;
}

.ball {
  position: absolute;
  width: 20px;
  height: 20px;
  background-color: red;
  border-radius: 50%;
}



  </style>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  
  <div class='cover'>
   
     <div class="game-area">
       <div class="score">
         <br>
    <span id="leftScore">0</span> - <span id="rightScore">0</span>
  </div>
    <div class="paddle" id="leftPaddle"></div>
    <div class="paddle" id="rightPaddle"></div>
    <div class="ball" id="ball"></div>
  </div>
  
     <center><small>Table Tennis Game - Created by Joseph Jerry U</small></center>
  </div>
  <script src="script.js"></script>
  <script>
    const ball = document.getElementById('ball');
let ballX = 300;
let ballY = 200;
let ballSpeedX = 2;
let ballSpeedY = 2;

const leftPaddle = document.getElementById('leftPaddle');
const rightPaddle = document.getElementById('rightPaddle');
let leftPaddleY = 160;
let rightPaddleY = 160;

let leftScore = 0;
let rightScore = 0;

function update() {
  ballX += ballSpeedX;
  ballY += ballSpeedY;

  if (ballY <= 0 || ballY >= 380) {
    ballSpeedY = -ballSpeedY;
  }

  if (ballX <= 0) {
    // Ball touched the left border, increment rightScore
    rightScore++;
    resetBall();
  }

  if (ballX >= 580) {
    // Ball touched the right border, increment leftScore
    leftScore++;
    resetBall();
  }

  if (ballX <= 30 && ballY >= leftPaddleY && ballY <= leftPaddleY + 80) {
    ballSpeedX = -ballSpeedX;
  }

  if (ballX >= 560 && ballY >= rightPaddleY && ballY <= rightPaddleY + 80) {
    ballSpeedX = -ballSpeedX;
  }

  ball.style.left = ballX + 'px';
  ball.style.top = ballY + 'px';

  // Simple AI for the right paddle
  const paddleCenter = rightPaddleY + 40;
  if (paddleCenter < ballY - 20) {
    rightPaddleY += 3;
  } else if (paddleCenter > ballY + 20) {
    rightPaddleY -= 3;
  }
  rightPaddle.style.top = rightPaddleY + 'px';

  // Update the scores in the HTML
  document.getElementById('leftScore').innerText = leftScore;
  document.getElementById('rightScore').innerText = rightScore;
}

function resetBall() {
  // Reset the ball position to the center
  ballX = 300;
  ballY = 200;
}

setInterval(update, 10);

document.addEventListener('keydown', function (event) {
  if (event.key === 'ArrowUp' && leftPaddleY > 0) {
    leftPaddleY -= 60;
    leftPaddle.style.top = leftPaddleY + 'px';
  } else if (event.key === 'ArrowDown' && leftPaddleY < 320) {
    leftPaddleY += 60;
    leftPaddle.style.top = leftPaddleY + 'px';
  }
});

  </script>
</body>
</html>
